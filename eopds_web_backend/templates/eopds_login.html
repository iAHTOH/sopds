{% extends "eopds_main.html" %}
{% load i18n %}
{% load static %}

{% block body %}
<style>
.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 2.5rem;
}
.toggle-password {
    position: absolute;
    right: 0.5rem;
    bottom: 0.5rem;
    cursor: pointer;
    font-size: 1.25rem;
    color: #888;
    user-select: none;
    z-index: 2;
}
.toggle-password:hover {
    color: #333;
}
</style>

<script>
function togglePasswordVisibility() {
    var pwd = document.getElementById('password-field');
    var icon = document.getElementById('password-icon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'fi-eye-crossed toggle-password';
    } else {
        pwd.type = 'password';
        icon.className = 'fi-eye toggle-password';
    }
}
</script>

<form method="post" action='{% url "web:login" %}'>
{% csrf_token %}
<div class="row">
<div class="small-6 medium-4 large-3 small-centered columns">
      <label>{% trans "Username" %}
        <input type="text" name="username" placeholder="{% trans "Enter Username" %}">
      </label>
      <label>{% trans "Password" %}
        <div class="password-wrapper">
            <input id="password-field" type="password" name="password" placeholder="{% trans "Enter Password" %}">
            <i id="password-icon" class="fi-eye toggle-password" onclick="togglePasswordVisibility()"></i>
        </div>
      </label>
	  <input type="submit" class="button" value="{% trans "Log in" %}">
</div>
</div>
</form>
<br>
{% endblock %}  {# body #}
