{% extends "sopds_main.html" %}
{% load i18n %}
{% load static %}

{% block block-js %}
<script src="{% static 'js/epub.min.js' %}"></script>
<style>
#reader-viewer {
    width: 100%;
    height: 75vh;
    margin: 0 auto;
    background: #f5f5f0;
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}
#reader-viewer iframe {
    width: 100%;
    height: 100%;
    border: none;
}
.reader-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: #fff;
    border: 1px solid #ddd;
    border-top: none;
    border-radius: 0 0 4px 4px;
    flex-wrap: wrap;
    gap: 4px;
    font-size: 13px;
}
.reader-toolbar .nav-group {
    display: flex;
    align-items: center;
    gap: 4px;
}
.reader-toolbar button {
    padding: 3px 10px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fafafa;
    cursor: pointer;
    font-size: 13px;
}
.reader-toolbar button:hover { background: #eaeaea; }
.reader-toolbar .progress-info { font-size: 12px; color: #666; }
.reader-toolbar select { font-size: 12px; padding: 2px; }
@media (max-width: 600px) {
    #reader-viewer { height: 60vh; }
}
</style>

<script>
(function() {
var bookUrl = "{% url 'web:serve_epub' book.id %}";
var bookmarkCfi = "{{ bookmark_cfi|escapejs }}";
var fontSize = 100;
var isDark = false;

var book = ePub(bookUrl);
var rendition = book.renderTo("reader-viewer", {
    width: "100%",
    height: "100%",
    spread: "none",
    flow: "paginated"
});

if (bookmarkCfi) {
    rendition.display(bookmarkCfi);
} else {
    rendition.display();
}

// Обработка ошибок загрузки
book.loaded.metadata.catch(function(err) {
    document.getElementById('reader-viewer').innerHTML =
        '<div style="padding:40px;text-align:center;color:#c00;">' +
        '{% trans "Error loading book" %}. ' + err.message + '</div>';
});

rendition.on("relocated", function(location) {
    if (location && location.start) {
        document.getElementById('page-info').textContent = location.start.display || '—';
        var pct = 0;
        if (location.start.cfi) {
            var m = location.start.cfi.match(/\/[4]\/(\d+)/);
            if (m && book.spine) {
                pct = Math.round((parseInt(m[1]) / book.spine.length) * 100);
            }
        }
        document.getElementById('pct-info').textContent = pct + '%';
    }
});

window.saveBookmark = function() {
    var loc = rendition.currentLocation();
    if (!loc || !loc.start || !loc.start.cfi) { alert('{% trans "Unable to get position" %}'); return; }
    var cfi = loc.start.cfi;
    var pct = 0;
    var m = cfi.match(/\/[4]\/(\d+)/);
    if (m && book.spine) { pct = Math.round((parseInt(m[1]) / book.spine.length) * 100); }
    fetch("{% url 'web:bookmark_save' book.id %}", {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
        body: JSON.stringify({cfi: cfi, percentage: pct})
    }).then(function(r){return r.json();}).then(function(d){
        document.getElementById('pct-info').textContent = d.percentage + '%';
    });
};

window.setFont = function(val) {
    rendition.themes.register("user", {"body": {"font-family": val + " !important"}});
    rendition.themes.select("user");
};
window.changeFontSize = function(delta) {
    fontSize += delta * 10;
    if (fontSize < 60) fontSize = 60;
    if (fontSize > 200) fontSize = 200;
    rendition.themes.register("size", {"body": {"font-size": fontSize + "% !important"}});
    rendition.themes.select("size");
};
window.toggleTheme = function() {
    isDark = !isDark;
    var theme = isDark ? {"body": {"background": "#222", "color": "#ddd"}} : {"body": {"background": "#f5f5f0", "color": "#333"}};
    rendition.themes.register("theme", theme);
    rendition.themes.select("theme");
    document.getElementById('theme-btn').textContent = isDark ? '☾' : '☀';
};

document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowLeft") rendition.prev();
    if (e.key === "ArrowRight") rendition.next();
});
})();
</script>
{% endblock %}

{% block body %}
<div class="row">
<div class="small-12 columns">
    <h5>{{ book.title }}</h5>
    <p style="font-size:80%; color:#666;">{{ authors }}</p>
    
    <div id="reader-viewer"></div>
    
    <div class="reader-toolbar">
        <div class="nav-group">
            <button onclick="rendition.prev()">‹</button>
            <span class="progress-info" id="page-info">—</span>
            <button onclick="rendition.next()">›</button>
        </div>
        <div class="nav-group">
            <label>{% trans "Font:" %}</label>
            <select id="font-select" onchange="setFont(this.value)">
                <option value="serif">Serif</option>
                <option value="sans-serif">Sans</option>
            </select>
            <button onclick="changeFontSize(-1)">A−</button>
            <button onclick="changeFontSize(1)">A+</button>
            <button onclick="toggleTheme()" id="theme-btn">☀</button>
        </div>
        <div class="nav-group">
            <span class="progress-info" id="pct-info">0%</span>
            <button onclick="saveBookmark()">{% trans "Bookmark" %}</button>
        </div>
    </div>
</div>
</div>
{% endblock %}
